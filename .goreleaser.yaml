version: 2
project_name: prr
builds:
  - main: ./cmd/prr
    binary: prr
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X github.com/ravistakumar/prr/internal/cli.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
