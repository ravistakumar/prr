version: 2
project_name: prr
builds:
  - main: ./cmd/prr
    binary: prr
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X github.com/ravistakumar/prr/internal/cli.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
homebrew_casks:
  - name: prr
    repository:
      owner: ravistakumar
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/ravistakumar/prr"
    description: "Refine your prompt before your AI coding agent runs it — a terminal prompt firewall for Claude Code and Codex"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/prr"]
          end
