<!doctype html>
<!-- Source for the GitHub social-preview image. Render with docs/demo/render-social.sh -->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap");
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1280px; height: 640px; }
      body {
        font-family: "JetBrains Mono", monospace;
        background: radial-gradient(1200px 700px at 20% -10%, #2a2a40 0%, #1e1e2e 55%, #181825 100%);
        color: #cdd6f4;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px 90px;
        position: relative;
        overflow: hidden;
      }
      .glow {
        position: absolute; right: -160px; top: -160px;
        width: 520px; height: 520px; border-radius: 50%;
        background: radial-gradient(circle, rgba(203,166,247,0.20) 0%, rgba(203,166,247,0) 70%);
      }
      .wordmark { font-size: 150px; font-weight: 800; letter-spacing: -4px; line-height: 1; color: #cba6f7; }
      .wordmark .cursor { color: #a6e3a1; }
      .tagline { font-size: 40px; font-weight: 700; margin-top: 18px; color: #f5f5f7; max-width: 1000px; line-height: 1.25; }
      .flow { font-size: 24px; margin-top: 30px; color: #9399b2; }
      .flow b { color: #89b4fa; font-weight: 700; }
      .footer {
        position: absolute; left: 90px; bottom: 64px;
        font-size: 24px; color: #7f849c; display: flex; gap: 26px; align-items: center;
      }
      .pill { border: 1.5px solid #45475a; border-radius: 999px; padding: 8px 20px; color: #bac2de; font-weight: 700; }
      .gh { position: absolute; right: 90px; bottom: 64px; font-size: 24px; color: #7f849c; }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="wordmark">prr<span class="cursor">▌</span></div>
    <div class="tagline">Refine your prompt before your AI coding agent runs it.</div>
    <div class="flow">vague prompt &nbsp;→&nbsp; <b>ask the right question</b> &nbsp;→&nbsp; <b>sharpened prompt</b> &nbsp;→&nbsp; ship</div>
    <div class="footer">
      <span class="pill">Claude Code</span>
      <span class="pill">Codex</span>
      <span>terminal · MIT</span>
    </div>
    <div class="gh">github.com/ravistakumar/prr</div>
  </body>
</html>
