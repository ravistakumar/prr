name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - run: go test ./...
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
